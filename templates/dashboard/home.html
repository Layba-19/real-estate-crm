{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Dashboard</h2>

<div class="row">
    <div class="col-md-6">
        <div class="card text-center p-4 shadow">
            <h4>Total Leads</h4>
            <h1>{{ total_leads }}</h1>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card text-center p-4 shadow">
            <h4>Total Properties</h4>
            <h1>{{ total_properties }}</h1>
        </div>
    </div>
</div>

<div class="mt-4">
    <a class="btn btn-primary" href="/leads/">Manage Leads</a>
    <a class="btn btn-success" href="/properties/">Manage Properties</a>
</div>

{% endblock %}
