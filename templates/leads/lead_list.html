{% extends 'base.html' %}

{% block content %}

<h2>Leads</h2>

<a class="btn btn-success mb-3" href="/leads/add/">Add New Lead</a>

<table class="table table-bordered table-striped">
    <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>

    {% for lead in leads %}
    <tr>
        <td>{{ lead.name }}</td>
        <td>{{ lead.phone }}</td>
        <td>{{ lead.email }}</td>
        <td>
            <a class="btn btn-warning btn-sm" href="/leads/edit/{{ lead.id }}/">Edit</a>
            <a class="btn btn-danger btn-sm" href="/leads/delete/{{ lead.id }}/">Delete</a>
        </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="4">No leads found</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
